{% extends "base.html" %}
{% block title %}Create Run Event — ChessGrunts{% endblock %}
{% block content %}

<div class="page-header">
  <p class="page-label">// running · new event</p>
  <h1 class="page-title"><span class="accent-run">NEW</span> EVENT</h1>
</div>

<div style="max-width:560px;">
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Event Name</label>
      <input type="text" name="name" class="form-input" placeholder="e.g. May Distance Challenge" required />
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-input" placeholder="What's this event about?"></textarea>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label">Start Date</label>
        <input type="datetime-local" name="start_date" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label">End Date</label>
        <input type="datetime-local" name="end_date" class="form-input" required />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Distance Target (km, optional)</label>
      <input type="number" name="target_distance" class="form-input" placeholder="e.g. 100" min="0" step="0.5" />
    </div>
    <button type="submit" class="btn-run btn" style="padding:12px 28px; font-size:13px; border-radius:2px;">
      Create Event →
    </button>
  </form>
</div>

{% endblock %}
